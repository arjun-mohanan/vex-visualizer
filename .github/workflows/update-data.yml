# GitHub Actions Workflow: Auto-Update VEX Visualizer Data
# Save as: .github/workflows/update-data.yml
#
# SMART SCHEDULING:
#   - Worlds week (Apr 28 – May 3, 2026): Every 15 minutes
#   - Worlds month (Apr 14 – May 6):      Every 2 hours
#   - Rest of season:                      Once per day at 6 AM UTC
#   - Manual trigger:                      Anytime from the Actions tab
#
# SETUP:
#   1. Get a RobotEvents API token: https://www.robotevents.com/api/v2
#   2. Repo Settings → Secrets → Actions → New secret
#      Name: ROBOTEVENTS_TOKEN   Value: your-token
#   3. Push this file to .github/workflows/update-data.yml

name: Update VEX Visualizer Data

on:
  schedule:
    # ── WORLDS WEEK (Apr 28 – May 3): every 15 minutes ──
    # These only actually run during the specified date window
    # (the job checks the date and exits early if outside Worlds week)
    - cron: '*/15 * 28-30 4 *'   # Apr 28-30, every 15 min
    - cron: '*/15 * 1-3 5 *'     # May 1-3, every 15 min

    # ── WORLDS MONTH (April – early May): every 2 hours ──
    - cron: '0 */2 1-27 4 *'     # Apr 1-27, every 2 hours
    - cron: '0 */2 4-10 5 *'     # May 4-10, every 2 hours

    # ── REST OF SEASON: once per day at 6 AM UTC ──
    - cron: '0 6 * 1-3 *'        # Jan-Mar, daily
    - cron: '0 6 * 6-12 *'       # Jun-Dec, daily
    - cron: '0 6 11-31 5 *'      # May 11-31, daily

  # Manual trigger — click "Run workflow" in the Actions tab anytime
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild even if data unchanged'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

# Prevent overlapping runs
concurrency:
  group: data-update
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check if this run is relevant
        id: schedule_check
        run: |
          # For cron triggers, verify we're in the right time window
          # (GitHub cron can't do complex date logic, so we double-check here)
          MONTH=$(date -u +%m)
          DAY=$(date -u +%d)

          # Worlds week: Apr 27 – May 4 (with buffer)
          WORLDS_WEEK="false"
          if [[ "$MONTH" == "04" && "$DAY" -ge 27 ]]; then WORLDS_WEEK="true"; fi
          if [[ "$MONTH" == "05" && "$DAY" -le 4 ]]; then WORLDS_WEEK="true"; fi

          echo "worlds_week=$WORLDS_WEEK" >> $GITHUB_OUTPUT
          echo "Current: $(date -u), Worlds week: $WORLDS_WEEK"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run data update
        env:
          ROBOTEVENTS_TOKEN: ${{ secrets.ROBOTEVENTS_TOKEN }}
          FORCE_REBUILD: ${{ github.event.inputs.force_rebuild || 'false' }}
        run: python update_data.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet index.html teams_data.json 2>/dev/null && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "VEX Visualizer Bot"
          git config user.email "actions@github.com"
          git add index.html teams_data.json

          # Include context in commit message
          if [[ "${{ steps.schedule_check.outputs.worlds_week }}" == "true" ]]; then
            PREFIX="[Worlds Live]"
          else
            PREFIX="[Scheduled]"
          fi

          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          TEAM_COUNT=$(python3 -c "import json; print(len(json.load(open('teams_data.json'))))" 2>/dev/null || echo "?")

          git commit -m "$PREFIX Update team data — $TEAM_COUNT teams — $TIMESTAMP"
          git push

      - name: Summary
        run: |
          echo "### VEX Visualizer Update" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.changes.outputs.changed }}" == "true" ]]; then
            echo "✅ **Data updated and deployed**" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ **No changes detected — skipped**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Worlds week mode: ${{ steps.schedule_check.outputs.worlds_week }}" >> $GITHUB_STEP_SUMMARY
          echo "- Time: $(date -u +"%Y-%m-%d %H:%M UTC")" >> $GITHUB_STEP_SUMMARY
