# GitHub Actions Workflow: Auto-Update VEX Visualizer Data
# Save as: .github/workflows/update-data.yml
#
# SMART SCHEDULING:
#   - Worlds week (Apr 21 – Apr 27, 2026): Every 15 minutes
#   - Worlds month (Apr 1 – Apr 30):       Every 2 hours
#   - Rest of season:                       Once per day at 6 AM UTC
#   - Manual trigger:                       Anytime from the Actions tab
#
# SETUP:
#   1. Get a RobotEvents API token: https://www.robotevents.com/api/v2
#   2. Repo Settings → Secrets → Actions → New secret
#      Name: ROBOTEVENTS_TOKEN   Value: your-token
#   3. Push this file to .github/workflows/update-data.yml

name: Update VEX Visualizer Data

on:
  schedule:
    # ── WORLDS WEEK (Apr 21 – Apr 27): every 15 minutes ──
    # V5RC HS: Apr 21-24, V5RC MS: Apr 25-27
    - cron: '*/15 * 21-27 4 *'   # Apr 21-27, every 15 min

    # ── WORLDS MONTH (April): every 2 hours ──
    - cron: '0 */2 1-20 4 *'     # Apr 1-20, every 2 hours
    - cron: '0 */2 28-30 4 *'    # Apr 28-30, every 2 hours

    # ── REST OF SEASON: once per day at 6 AM UTC ──
    - cron: '0 6 * 1-3 *'        # Jan-Mar, daily
    - cron: '0 6 * 5-12 *'       # May-Dec, daily

  # Manual trigger — click "Run workflow" in the Actions tab anytime
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild even if data unchanged'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

# Prevent overlapping runs
concurrency:
  group: data-update
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check if this run is relevant
        id: schedule_check
        run: |
          MONTH=$(date -u +%m)
          DAY=$(date -u +%d)

          # Worlds week: Apr 21 – Apr 27
          WORLDS_WEEK="false"
          if [[ "$MONTH" == "04" && "$DAY" -ge 21 && "$DAY" -le 27 ]]; then WORLDS_WEEK="true"; fi

          echo "worlds_week=$WORLDS_WEEK" >> $GITHUB_OUTPUT
          echo "Current: $(date -u), Worlds week: $WORLDS_WEEK"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch Middle School data
        env:
          ROBOTEVENTS_TOKEN: ${{ secrets.ROBOTEVENTS_TOKEN }}
        run: python fetch_ms_data.py || echo "MS fetch failed (non-fatal)"

      - name: Check if MS data changed
        id: ms_check
        run: |
          if git diff --quiet ms_teams_data.json 2>/dev/null; then
            echo "ms_changed=false" >> $GITHUB_OUTPUT
          else
            echo "ms_changed=true" >> $GITHUB_OUTPUT
            echo "MS data changed — will force rebuild"
          fi

      - name: Run data update (HS + rebuild)
        env:
          ROBOTEVENTS_TOKEN: ${{ secrets.ROBOTEVENTS_TOKEN }}
          FORCE_REBUILD: ${{ steps.ms_check.outputs.ms_changed == 'true' && 'true' || github.event.inputs.force_rebuild || 'false' }}
        run: python update_data.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet index.html teams_data.json ms_teams_data.json version.json 2>/dev/null && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "VEX Visualizer Bot"
          git config user.email "actions@github.com"
          git add index.html teams_data.json ms_teams_data.json version.json

          # Include context in commit message
          if [[ "${{ steps.schedule_check.outputs.worlds_week }}" == "true" ]]; then
            PREFIX="[Worlds Live]"
          else
            PREFIX="[Scheduled]"
          fi

          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          HS_COUNT=$(python3 -c "import json; print(len(json.load(open('teams_data.json'))))" 2>/dev/null || echo "?")
          MS_COUNT=$(python3 -c "import json; print(len(json.load(open('ms_teams_data.json'))))" 2>/dev/null || echo "0")

          git commit -m "$PREFIX Update data — ${HS_COUNT} HS + ${MS_COUNT} MS teams — $TIMESTAMP"
          git push

      - name: Summary
        run: |
          echo "### VEX Visualizer Update" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.changes.outputs.changed }}" == "true" ]]; then
            echo "✅ **Data updated and deployed**" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ **No changes detected — skipped**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Worlds week mode: ${{ steps.schedule_check.outputs.worlds_week }}" >> $GITHUB_STEP_SUMMARY
          echo "- Time: $(date -u +"%Y-%m-%d %H:%M UTC")" >> $GITHUB_STEP_SUMMARY
          HS=$(python3 -c "import json; print(len(json.load(open('teams_data.json'))))" 2>/dev/null || echo "?")
          MS=$(python3 -c "import json; print(len(json.load(open('ms_teams_data.json'))))" 2>/dev/null || echo "0")
          echo "- HS teams: $HS, MS teams: $MS" >> $GITHUB_STEP_SUMMARY
